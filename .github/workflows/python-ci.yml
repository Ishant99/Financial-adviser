name: Python CI

on:
  push:
    paths:
      - "src/analytics-service/**"
    branches: ["**"]
  pull_request:
    paths:
      - "src/analytics-service/**"
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/analytics-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -v --tb=short
